<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>饭卡通 - 移动支付平台</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212; /* Dark ambient background */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #root {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .app-frame {
            width: 393px; /* Logical width for 1179px physical */
            height: 852px; /* Logical height for 2556px physical */
            background-color: #f8f9fb;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 12px solid #222;
            border-radius: 54px;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.7);
        }

        @media (max-height: 900px) {
            .app-frame {
                transform: scale(0.9);
            }
        }
        @media (max-height: 800px) {
            .app-frame {
                transform: scale(0.8);
            }
        }
        @media (max-height: 700px) {
            .app-frame {
                transform: scale(0.7);
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
            margin: 0 40px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(37, 99, 235, 0.6);
            border-radius: 10px;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .scale-in {
            animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .floating-btn {
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
        }

        .iphone-x-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .card-container {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Mock Data
        const MOCK_CARDS = [
            { 
                id: '1', 
                title: '杭州硕洋科技', 
                balance: null, 
                cardId: '70001813989850712', 
                color: 'bg-gradient-to-br from-blue-600 to-blue-800',
                allowedChannels: ['box', 'canteen', 'mall'],
                allowedTabs: ['home', 'pay', 'mall', 'mine']
            },
            { 
                id: '2', 
                title: '世纪联华生活惠', 
                balance: 100.79, 
                cardId: '1959502521', 
                color: 'bg-gradient-to-br from-red-500 to-red-700',
                allowedChannels: ['jingxuan', 'mall'],
                allowedTabs: ['home', 'jingxuan', 'pay', 'mall', 'mine'],
                isSubCard: true
            },
            { 
                id: '3', 
                title: '饭卡通商城测试卡', 
                balance: 0.1, 
                cardId: 'TEST00131', 
                color: 'bg-gradient-to-br from-pink-500 to-pink-700',
                allowedChannels: ['mall'],
                allowedTabs: ['home', 'mall', 'mine']
            },
            { 
                id: '4', 
                title: '大牛集团(hpt测试)', 
                balance: 500.0, 
                cardId: 'TEST00020', 
                color: 'bg-gradient-to-br from-cyan-600 to-cyan-800',
                allowedChannels: ['jingxuan', 'box', 'canteen', 'mall'],
                allowedTabs: ['home', 'jingxuan', 'pay', 'mall', 'mine']
            }
        ];

        const MOCK_BANNERS = [
            { id: 'b1', imageUrl: 'https://picsum.photos/seed/mall1/800/400', title: '热销好价 大迈露营桌椅套装' },
            { id: 'b2', imageUrl: 'https://picsum.photos/seed/mall2/800/400', title: '4月踏青季 饭卡通线上商城' }
        ];

        const MOCK_PRODUCTS = [
            { id: 'p1', enterpriseId: '1', name: '办公A4纸 500张/包', price: 25.0, imageUrl: 'https://picsum.photos/seed/paper/300/300', tag: '办公' },
            { id: 'p2', enterpriseId: '1', name: '得力订书机套装', price: 15.0, imageUrl: 'https://picsum.photos/seed/stapler/300/300' },
            { id: 'p3', enterpriseId: '2', name: '五常大米 5kg', price: 59.9, imageUrl: 'https://picsum.photos/seed/rice/300/300', tag: '热销' },
            { id: 'p4', enterpriseId: '2', name: '特仑苏纯牛奶 250ml*12', price: 65.0, imageUrl: 'https://picsum.photos/seed/milk/300/300', tag: '限时' },
            { id: 'p5', enterpriseId: '3', name: '金龙鱼调和油 5L', price: 89.0, imageUrl: 'https://picsum.photos/seed/oil/300/300' },
            { id: 'p6', enterpriseId: '4', name: '进口车厘子 500g', price: 45.0, imageUrl: 'https://picsum.photos/seed/cherry/300/300', tag: '生鲜' },
        ];

        const MOCK_TRANSACTIONS = [
            { id: 't1', cardId: '1', channel: '员工食堂', amount: -15.5, time: '2024-04-20 12:30', type: 'payment' },
            { id: 't2', cardId: '1', channel: '联华超市', amount: -45.2, time: '2024-04-20 18:15', type: 'payment' },
            { id: 't3', cardId: '2', channel: '线上商城', amount: -65.0, time: '2024-04-21 10:05', type: 'payment' },
            { id: 't4', cardId: '1', channel: '智能售货柜', amount: -3.5, time: '2024-04-21 14:20', type: 'payment' },
            { id: 't5', cardId: '4', channel: '员工食堂', amount: -22.0, time: '2024-04-22 08:30', type: 'payment' },
            { id: 't6', cardId: '1', channel: '线上商城', amount: 30.0, time: '2024-04-22 11:00', type: 'refund' },
            { id: 't7', cardId: '2', channel: '联华超市', amount: -12.8, time: '2024-04-22 16:45', type: 'payment' },
            { id: 't8', cardId: '4', channel: '智能售货柜', amount: -5.0, time: '2024-04-23 09:15', type: 'payment' },
        ];

        const MOCK_TOPUP_RECORDS = [
            { id: 'r1', cardId: '1', amount: 100.0, time: '2024-04-15 09:00', type: 'topup' },
            { id: 'r2', cardId: '1', amount: 200.0, time: '2024-04-16 14:30', type: 'topup' },
            { id: 'r3', cardId: '2', amount: 50.0, time: '2024-04-18 10:20', type: 'topup' },
            { id: 'r4', cardId: '4', amount: 300.0, time: '2024-04-20 11:45', type: 'topup' },
            { id: 'r5', cardId: '1', amount: -20.0, time: '2024-04-21 16:00', type: 'deduction' },
            { id: 'r6', cardId: '4', amount: 100.0, time: '2024-04-22 09:30', type: 'topup' },
        ];

        // Icon Component Wrapper for Standalone
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        targets: [iconRef.current]
                    });
                }
            }, [name]);
            return <i data-lucide={name} className={className} ref={iconRef}></i>;
        };

        const WeChatHeader = ({ title, showBack = false, forceLight = false, onBack, style = {} }) => {
            const finalStyle = forceLight ? {
                bg: 'rgba(255,255,255,1)',
                color: '#000',
                cBg: 'rgba(0,0,0,0.05)',
                cBorder: 'rgba(0,0,0,0.1)',
                cIcon: '#000'
            } : style;

            return (
                <div 
                    style={{ backgroundColor: finalStyle.bg, color: finalStyle.color }}
                    className="fixed top-0 left-0 right-0 z-50 max-w-md mx-auto transition-colors duration-200"
                >
                    <div className="h-6 flex items-center justify-between px-6 pt-1">
                        <span className="text-[10px] font-bold">9:41</span>
                        <div className="flex items-center gap-1">
                            <Icon name="signal" className="w-3 h-3" />
                            <Icon name="wifi" className="w-3 h-3" />
                            <Icon name="battery" className="w-3 h-3" />
                        </div>
                    </div>
                    <div className="h-11 flex items-center justify-between px-4">
                        <div className="flex-1 flex items-center">
                            {showBack && (
                                <button onClick={onBack} className="p-2">
                                    <Icon name="chevron-left" className="w-5 h-5 rotate-180" />
                                </button>
                            )}
                        </div>
                        <div className="flex-1 text-center font-bold text-sm truncate px-2">{title}</div>
                        <div className="flex-1 flex justify-end">
                            <div 
                                style={{ backgroundColor: finalStyle.cBg, borderColor: finalStyle.cBorder, color: finalStyle.cIcon }}
                                className="backdrop-blur-md border rounded-full h-8 flex items-center px-3 gap-3 transition-colors"
                            >
                                <Icon name="more-horizontal" className="w-4 h-4" />
                                <div className="w-px h-3 bg-current opacity-20" />
                                <Icon name="circle" className="w-3.5 h-3.5 fill-current" />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [mallSubTab, setMallSubTab] = useState('mall-home');
            const [selectedMallCardIndex, setSelectedMallCardIndex] = useState(0);
            const [isMallCardBottomSheetOpen, setIsMallCardBottomSheetOpen] = useState(false);
            const [showMiniProgramModal, setShowMiniProgramModal] = useState(false);
            const [activeCardIndex, setActiveCardIndex] = useState(0);
            const [mineSubTab, setMineSubTab] = useState('main');
            const [historyFilterCardId, setHistoryFilterCardId] = useState('all');
            const [historyFilterChannel, setHistoryFilterChannel] = useState('all');
            const [topupFilterCardId, setTopupFilterCardId] = useState('all');
            const [pendingCardIndex, setPendingCardIndex] = useState(null);
            const [showSwitchModal, setShowSwitchModal] = useState(false);
            const [currentBanner, setCurrentBanner] = useState(0);
            const [selectedPayCard, setSelectedPayCard] = useState(MOCK_CARDS[0]);
            const [payType, setPayType] = useState('canteen');
            const [isPayCardBottomSheetOpen, setIsPayCardBottomSheetOpen] = useState(false);
            const [headerStyle, setHeaderStyle] = useState({
                bg: 'rgba(255,255,255,0)',
                color: '#fff',
                cBg: 'rgba(0,0,0,0.15)',
                cBorder: 'rgba(255,255,255,0.2)',
                cIcon: '#fff'
            });
            
            const handlePageScroll = (e) => {
                const y = e.target.scrollTop;
                const ratio = Math.min(y / 60, 1);
                setHeaderStyle({
                    bg: `rgba(255,255,255,${ratio})`,
                    color: ratio > 0.5 ? '#000' : '#fff',
                    cBg: ratio > 0.5 ? 'rgba(0,0,0,0.05)' : 'rgba(0,0,0,0.15)',
                    cBorder: ratio > 0.5 ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.2)',
                    cIcon: ratio > 0.5 ? '#000' : '#fff'
                });
            };

            // Sync mall card with main card when entering mall
            useEffect(() => {
                if (activeTab === 'mall') {
                    setSelectedMallCardIndex(activeCardIndex);
                }
                if (activeTab === 'pay') {
                    setSelectedPayCard(MOCK_CARDS[activeCardIndex]);
                }
            }, [activeTab, activeCardIndex]);

            useEffect(() => {
                // Reset scroll style on tab change if not forceLight
                if (['home', 'pay'].includes(activeTab)) {
                    setHeaderStyle({
                        bg: 'rgba(255,255,255,0)',
                        color: '#fff',
                        cBg: 'rgba(0,0,0,0.15)',
                        cBorder: 'rgba(255,255,255,0.2)',
                        cIcon: '#fff'
                    });
                }
            }, [activeTab]);
            
            const scrollTimeoutRef = useRef(null);
            const isProgrammaticScroll = useRef(false);
            const cardScrollRef = useRef(null);
            const observerRef = useRef(null);

            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentBanner((prev) => (prev + 1) % MOCK_BANNERS.length);
                }, 4000);
                return () => clearInterval(timer);
            }, []);

            const activeEnterpriseId = MOCK_CARDS[activeCardIndex].id;
            const filteredProducts = useMemo(() => 
                MOCK_PRODUCTS.filter(p => p.enterpriseId === activeEnterpriseId),
                [activeCardIndex]
            );

            // Authoritative scroll sync function
            const scrollToCard = (index, behavior = 'smooth') => {
                if (!cardScrollRef.current) return;
                const container = cardScrollRef.current;
                const targetCard = container.children[index];
                if (targetCard) {
                    isProgrammaticScroll.current = true;
                    const targetLeft = targetCard.offsetLeft - (container.offsetWidth - targetCard.offsetWidth) / 2;
                    container.scrollTo({
                        left: targetLeft,
                        behavior: behavior
                    });
                    
                    // Unlock after animation
                    setTimeout(() => {
                        isProgrammaticScroll.current = false;
                    }, 800);
                }
            };

            // Sync on mount and tab change
            useEffect(() => {
                if (activeTab === 'home') {
                    // Small delay to ensure DOM is ready
                    const timer = setTimeout(() => scrollToCard(activeCardIndex, 'auto'), 50);
                    return () => clearTimeout(timer);
                }
            }, [activeTab]);

            const confirmSwitch = () => {
                if (pendingCardIndex !== null) {
                    const newIndex = pendingCardIndex;
                    setActiveCardIndex(newIndex);
                    // Ensure it stays there
                    setTimeout(() => scrollToCard(newIndex, 'smooth'), 100);
                }
                setShowSwitchModal(false);
                setPendingCardIndex(null);
            };

            const cancelSwitch = () => {
                setShowSwitchModal(false);
                setPendingCardIndex(null);
                // Force scroll back to the original active card
                setTimeout(() => scrollToCard(activeCardIndex, 'smooth'), 100);
            };

            const HomePage = () => (
                <div className="flex-1 overflow-y-auto pb-32 fade-in no-scrollbar" onScroll={handlePageScroll}>
                    <WeChatHeader title="饭卡通" style={headerStyle} />
                    
                    <div className="relative h-64 w-full overflow-hidden">
                        <img
                            src={MOCK_BANNERS[currentBanner].imageUrl}
                            alt={MOCK_BANNERS[currentBanner].title}
                            className="w-full h-full object-cover transition-opacity duration-700"
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-black/20" />
                        <div className="absolute bottom-10 left-4 right-4 flex justify-between items-end">
                            <div className="text-white">
                                <h2 className="text-xl font-bold leading-tight">{MOCK_BANNERS[currentBanner].title}</h2>
                                <p className="text-xs opacity-80 mt-1">饭卡通商城 · 专属优惠</p>
                            </div>
                            <div className="flex gap-1 mb-1">
                                {MOCK_BANNERS.map((_, i) => (
                                    <div key={i} className={`h-1 w-4 rounded-full ${i === currentBanner ? 'bg-white' : 'bg-white/40'}`} />
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="mt-[-30px] relative z-10">
                        <div 
                            ref={cardScrollRef}
                            className="card-container flex overflow-x-auto snap-x snap-mandatory custom-scrollbar px-4 gap-3 pb-6 relative"
                        >
                            {MOCK_CARDS.map((card, idx) => (
                                <div
                                    key={card.id}
                                    className={`snap-center shrink-0 w-[85%] ${card.color} h-24 rounded-[20px] p-4 text-white shadow-xl relative overflow-hidden flex items-center justify-between transition-all`}
                                >
                                    <div className="absolute -right-6 -top-6 w-16 h-16 bg-white/10 rounded-full blur-xl" />
                                    
                                    <div className="flex-1 flex flex-col justify-between h-full">
                                        <div>
                                            <div className="flex items-center gap-2">
                                                <h3 className="text-[14px] font-extrabold truncate uppercase tracking-tight leading-none">{card.title}</h3>
                                                {idx === activeCardIndex ? (
                                                    <span className="text-[11px] bg-green-500/90 text-white px-2 py-0.5 rounded-md font-bold whitespace-nowrap shadow-sm">使用中</span>
                                                ) : (
                                                    <button 
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            setPendingCardIndex(idx);
                                                            setShowSwitchModal(true);
                                                        }}
                                                        className="text-[11px] bg-white/20 hover:bg-white/30 text-white px-2 py-0.5 rounded-md font-bold transition-colors cursor-pointer whitespace-nowrap ring-1 ring-white/20"
                                                    >
                                                        切换
                                                    </button>
                                                )}
                                            </div>
                                            <p className="text-[9px] font-mono opacity-50 mt-1">ID: {card.cardId}</p>
                                        </div>
                                        <div className="flex items-baseline gap-1">
                                            <span className="text-xl font-bold leading-none">
                                                {card.balance !== null ? card.balance.toFixed(2) : '---'}
                                            </span>
                                            <span className="text-[8px] opacity-60 font-bold">余额</span>
                                        </div>
                                    </div>

                                    {card.id !== '3' && (
                                        <div className="flex flex-col items-center justify-center h-full -mt-3">
                                            <div 
                                                className="bg-white/20 px-4 py-2.5 rounded-2xl backdrop-blur-md active:scale-95 transition-transform cursor-pointer flex flex-col items-center gap-0.5"
                                                onClick={(e) => {
                                                    e.stopPropagation();
                                                    if (idx !== activeCardIndex) {
                                                        setPendingCardIndex(idx);
                                                        setShowSwitchModal(true);
                                                    } else {
                                                        setSelectedPayCard(card);
                                                        setActiveTab('pay');
                                                    }
                                                }}
                                            >
                                                <Icon name="qr-code" className="w-7 h-7" />
                                                <span className="text-[10px] font-black opacity-90 tracking-tighter">去付款</span>
                                            </div>
                                        </div>
                                    )}

                                    {card.isSubCard && (
                                        <div className="absolute bottom-0 right-0 bg-gradient-to-l from-orange-600 to-orange-400 text-white px-4 py-1 rounded-tl-[16px] shadow-[0_-4px_12px_rgba(0,0,0,0.1)] font-black text-[10px] tracking-widest flex items-center justify-center border-t border-l border-white/30 z-20">
                                            副卡
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                        
                        {/* Card Indicator Dots */}
                        <div className="flex justify-center gap-1.5 mt-[-10px] mb-4">
                            {MOCK_CARDS.map((_, i) => (
                                <div 
                                    key={i} 
                                    className={`h-1.5 rounded-full transition-all duration-300 ${i === activeCardIndex ? 'w-6 bg-blue-600' : 'w-1.5 bg-gray-300'}`}
                                />
                            ))}
                        </div>
                    </div>

                    {/* Quick Actions Grid - Dynamic based on card */}
                    {(() => {
                        const activeActions = [
                            { id: 'jingxuan', icon: 'truck', label: '鲸选到家', color: 'text-blue-500', bg: 'bg-blue-50' },
                            { id: 'box', icon: 'box', label: '智能柜', color: 'text-purple-500', bg: 'bg-purple-50' },
                            { id: 'canteen', icon: 'calendar', label: '食堂订餐', color: 'text-green-500', bg: 'bg-green-50' },
                            { id: 'mall', icon: 'shopping-cart', label: '全国商城', color: 'text-red-500', bg: 'bg-red-50' },
                        ].filter(a => MOCK_CARDS[activeCardIndex].allowedChannels.includes(a.id));

                        if (activeActions.length === 0 || (activeActions.length === 1 && activeActions[0].id === 'mall')) {
                            return null;
                        }

                        return (
                            <div className="px-4 mt-2">
                                <div className="bg-white rounded-[16px] py-2 px-3 grid grid-cols-4 gap-2 shadow-sm border border-gray-50 text-center">
                                    {activeActions.map((action, i) => (
                                        <button 
                                            key={i} 
                                            onClick={() => {
                                                if (action.id === 'jingxuan') {
                                                    setShowMiniProgramModal(true);
                                                } else if (action.id === 'mall') {
                                                    setSelectedMallCardIndex(activeCardIndex);
                                                    setActiveTab('mall');
                                                    setMallSubTab('mall-home');
                                                }
                                            }}
                                            className="flex flex-col items-center gap-1 active:scale-90 transition-transform"
                                        >
                                            <div className={`w-10 h-10 ${action.bg} rounded-xl flex items-center justify-center`}>
                                                <Icon name={action.icon} className={`w-5 h-5 ${action.color}`} />
                                            </div>
                                            <span className="text-[14px] font-black text-gray-700 whitespace-nowrap">{action.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        );
                    })()}

                    <div className="px-4 mt-8">
                        <div className="flex justify-between items-center mb-5 px-1">
                            <div className="flex flex-col">
                                <div className="flex items-center gap-2">
                                    <h2 className="text-xl font-bold">{MOCK_CARDS[activeCardIndex].title}商城</h2>
                                    <span className="text-[10px] bg-red-500 text-white px-2 py-0.5 rounded-full font-bold">爆款</span>
                                </div>
                                <p className="text-[10px] text-blue-600 font-bold mt-1">
                                    正在浏览 [{MOCK_CARDS[activeCardIndex].title}] 专属商品
                                </p>
                            </div>
                            <button 
                                onClick={() => {
                                    setSelectedMallCardIndex(activeCardIndex);
                                    setActiveTab('mall');
                                    setMallSubTab('mall-home');
                                }}
                                className="text-xs text-blue-600 font-bold flex items-center gap-0.5 active:scale-95 transition-transform"
                            >
                                更多 <Icon name="chevron-right" className="w-4 h-4" />
                            </button>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            {filteredProducts.map((product) => (
                                <div key={product.id} className="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 flex flex-col active:translate-y-[-4px] transition-transform">
                                    <div className="relative aspect-square overflow-hidden bg-gray-50">
                                        <img src={product.imageUrl} alt={product.name} className="w-full h-full object-cover" />
                                        {product.tag && (
                                            <div className="absolute top-3 left-3 bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded-lg font-bold">

                                                        </div>
                                                    </div>
                                                </div>

                                            {mallSubTab === 'mall-mine' && (

                                                        <div className="flex items-center gap-4">
                                                            <div className="w-20 h-20 rounded-full border-4 border-white shadow-xl overflow-hidden bg-gray-50"><img src="https://picsum.photos/seed/u1/100/100" /></div>

                                                                    { label: '待收货', icon: 'truck' }, { label: '已完成', icon: 'check-circle' }

                                                                    { label: '领券中心', icon: 'tag' }, { label: '我的收藏', icon: 'star' }

                        {MOCK_CARDS[activeCardIndex].allowedTabs.includes('jingxuan') && (

                            </button>

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
